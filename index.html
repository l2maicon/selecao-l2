<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seleção L2 — Dinâmica do Encontro</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="L2">
<meta property="og:title" content="Seleção L2">
<meta property="og:description" content="A Seleção L2 escolhida na dinâmica do 1º Encontro de Lideranças.">
<meta property="og:image" content="https://l2maicon.github.io/selecao-l2/share.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://l2maicon.github.io/selecao-l2/">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#171B21">
<style>
  :root{ --bg:#171B21; --mint:#27E5BF; --off:#F2F3F4; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:#0e1116; color:var(--off); font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
        min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .wrap{ max-width:760px; width:100%; text-align:center; }
  h1{ font-size:30px; }
  .sub{ color:var(--mint); margin-top:8px; font-size:15px; }
  .logo{ display:block; width:220px; margin:0 auto 24px; }
  .corner{ position:fixed; right:22px; bottom:18px; width:76px; opacity:.85; }
  .cards{ display:flex; gap:20px; margin-top:40px; flex-wrap:wrap; justify-content:center; }
  a.card{ flex:1; min-width:260px; text-decoration:none; color:var(--off);
          background:var(--bg); border:1px solid rgba(39,229,191,.25); border-radius:16px;
          padding:32px 24px; transition:border-color .15s, transform .15s; display:block; }
  a.card:hover{ border-color:var(--mint); transform:translateY(-2px); }
  a.card .ico{ font-size:34px; }
  a.card h2{ font-size:20px; margin-top:14px; }
  a.card p{ opacity:.7; font-size:13px; margin-top:8px; line-height:1.4; }
  .foot{ margin-top:36px; opacity:.5; font-size:12px; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="logo.svg" alt="L2">
    <h1>Seleção L2</h1>
    <div class="sub">Dinâmica do 1º Encontro de Lideranças — resultados</div>
    <div class="cards">
      <a class="card" href="escolhidos-para-comecar-jogando.html">
        <div class="ico">⚽</div>
        <h2>Escolhidos para começar jogando</h2>
        <p>A escalação — mais votados por posição, no <span style="white-space:nowrap">4-3-3</span>.</p>
      </a>
      <a class="card" href="mapa-votos-fotos.html">
        <div class="ico">🗳️</div>
        <h2>Mapa de Votos</h2>
        <p>Todas as pessoas votadas em cada posição, com a contagem de votos.</p>
      </a>
    </div>
    <div class="foot">L2 · gerado a partir da dinâmica de entrosamento</div>
  </div>
  <img class="corner" src="logo.svg" alt="">
</body>
</html>
